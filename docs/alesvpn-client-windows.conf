# Документация AlesVPN / WireGuard для Windows
#
# Готовый файл для импорта НЕ хранится в Git (в нем секретный ключ).
# Сгенерируйте локально из корня репозитория MyVPN:
#
#   powershell -ExecutionPolicy Bypass -File .\tools\generate-alesvpn-windows-conf.ps1
#
# После этого импортируйте в WireGuard этот файл (валидный ключ уже внутри):
#   keys\generated\alesvpn-windows-import.conf
#
# Рядом появится keys\generated\client-public.key — его публичное содержимое нужно
# добавить на сервер (wg-add-peer.sh или правка wg0), с тем же /32 что в Address.
#
# Параметры сервера по умолчанию совпадают с mobile/android/.../wg_sample.conf
