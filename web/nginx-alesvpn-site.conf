# Скопировать на сервер: /etc/nginx/sites-available/alesvpn
# Затем: sudo ln -sf /etc/nginx/sites-available/alesvpn /etc/nginx/sites-enabled/
# Убрать default: sudo rm -f /etc/nginx/sites-enabled/default
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name alesvpn.ru www.alesvpn.ru;

    root /var/www/alesvpn;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
