# Скопировать на сервер: /etc/nginx/sites-available/alesvpn
# Затем: sudo ln -sf /etc/nginx/sites-available/alesvpn /etc/nginx/sites-enabled/
# Убрать default: sudo rm -f /etc/nginx/sites-enabled/default
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name alesvpn.ru www.alesvpn.ru;

    root /var/www/alesvpn;
    index index.html;
    client_max_body_size 1m;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Оплата ЮKassa + выдача ключа: uvicorn на 127.0.0.1:8008 (см. pay_api/README)
    location /pay/ {
        proxy_pass http://127.0.0.1:8008;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
